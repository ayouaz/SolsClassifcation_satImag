<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SatImag Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <style>
      html, body { height: 100%; margin: 0; }
      #app { height: 100%; display: flex; flex-direction: column; }
      header { padding: 8px; background: #1f2937; color: #fff; }
      #toolbar { padding: 8px; background: #f3f4f6; display: flex; gap: 8px; }
      #map { flex: 1; }
      button { padding: 6px 10px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <strong>SatImag</strong> – Analyse d'images satellitaires
      </header>
      <div id="toolbar">
        <button id="google-login">Se connecter avec Google</button>
        <button id="compute-ndvi">Calculer NDVI (placeholder)</button>
      </div>
      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
